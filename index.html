<style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }

  .progress-bar { height: 3px; background: #ddd; border-radius: 2px; margin-bottom: 0.4rem; }
  .progress-fill { height: 3px; background: #1a1a1a; border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: #999; text-align: right; margin-bottom: 1.25rem; }

  .option-btn { background: #f5f4f0; border: 1.5px solid transparent; border-radius: 10px; padding: 0.875rem 1.125rem; font-size: 14px; color: #1a1a1a; cursor: pointer; text-align: left; line-height: 1.55; transition: all 0.15s; width: 100%; font-family: inherit; }
  .option-btn:hover { background: #eee; }
  .option-btn.selected { background: #fff; border-color: #1a1a1a; font-weight: 600; }
  .shake { animation: shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .warn { font-size: 13px; color: #E24B4A; text-align: center; margin-top: 0.75rem; min-height: 20px; }
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; gap: 8px; }
  .prev-btn { border: 1px solid #ccc; background: transparent; border-radius: 10px; padding: 0.7rem 1.25rem; font-size: 14px; cursor: pointer; color: #555; transition: all 0.15s; font-family: inherit; }
  .prev-btn:hover { background: #eee; }
  .prev-btn:disabled { opacity: 0.3; cursor: default; }
  .next-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 10px; padding: 0.7rem 1.5rem; font-size: 14px; cursor: pointer; transition: all 0.15s; font-family: inherit; font-weight: 600; }
  .next-btn:hover { background: #333; }

  .result { display: none; }
  .result-header { text-align: center; margin-bottom: 2rem; }
  .lang-badge { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 1rem; }
  .result-title { font-size: 22px; font-weight: 700; margin-bottom: 0.4rem; }
  .result-sub { font-size: 14px; margin-bottom: 0.25rem; }
  .score-grid { display: grid; grid-template-columns: 1fr; gap: 6px; margin-bottom: 1.5rem; }
  .score-row { background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 12px; }
  .score-icon { font-size: 20px; width: 28px; text-align: center; }
  .score-name { font-size: 13px; font-weight: 600; min-width: 90px; }
  .score-bar-wrap { flex: 1; height: 6px; background: #eee; border-radius: 3px; }
  .score-bar { height: 6px; border-radius: 3px; transition: width 0.6s ease; }
  .score-num { font-size: 12px; color: #888; min-width: 24px; text-align: right; }
  .section-card { background: #fff; border: 1px solid #e8e6e0; border-radius: 16px; padding: 1.25rem; margin-bottom: 0.75rem; }
  .section-title { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .section-content { font-size: 15px; color: #1a1a1a; line-height: 1.75; }
  .tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.75rem; }
  .tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #f5f4f0; color: #666; border: 1px solid #e0dedd; }
  .retry-btn { width: 100%; margin-top: 1rem; border: 1px solid #ccc; background: transparent; border-radius: 10px; padding: 0.75rem; font-size: 14px; cursor: pointer; color: #555; font-family: inherit; transition: all 0.15s; }
  .retry-btn:hover { background: #eee; }

  @media (max-width: 480px) {
    body { padding: 1rem 0.75rem; }
    .header h1 { font-size: 20px; }
    .question-text { font-size: 14px; }

let answers = {};
let current = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const shuffledQ = questions.map(q => {
  const opts = shuffle([q.a, q.b]);
  return { opts };
});

function renderQ() {
  const q = shuffledQ[current];
  const total = questions.length;
  document.getElementById('progress').style.width = ((current / total) * 100) + '%';
  document.getElementById('progress-label').textContent = (current + 1) + ' / ' + total;
  document.getElementById('warn-msg').textContent = '';

  let html = `<div class="question-card" id="qcard">
    <div class="question-num">문항 ${current + 1} — 더 가깝게 느껴지는 것을 선택해주세요</div>
    <div class="options">`;

  q.opts.forEach(opt => {
    const sel = answers[current] === opt.label ? 'selected' : '';
    html += `<button class="option-btn ${sel}" onclick="selectOpt('${opt.label}')">${opt.text}</button>`;
  });

  html += `</div></div>`;
  document.getElementById('question-area').innerHTML = html;
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').textContent = current === total - 1 ? '결과 보기' : '다음';
}

function selectOpt(label) {
  answers[current] = label;
  document.getElementById('warn-msg').textContent = '';
  renderQ();
}

function nextQ() {
  if (!answers[current]) {
    document.getElementById('warn-msg').textContent = '답변을 선택해주세요.';
    const card = document.getElementById('qcard');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    return;
  }
  if (current < questions.length - 1) {
    current++;
    renderQ();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResult();
  }
}

function prevQ() {
  if (current > 0) { current--; renderQ(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}

function showResult() {
  const scores = { W: 0, T: 0, G: 0, A: 0, S: 0 };
  Object.values(answers).forEach(v => scores[v]++);
  const max = Math.max(...Object.values(scores));
  const top = Object.keys(scores).find(k => scores[k] === max);
  const info = langInfo[top];

  document.getElementById('quiz-section').style.display = 'none';
  const res = document.getElementById('result-section');
  res.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const badge = document.getElementById('res-badge');
  badge.style.background = info.bg;
  badge.textContent = info.icon;

  document.getElementById('res-title').textContent = info.name;
  const sub = document.getElementById('res-sub');
  sub.textContent = '나의 주된 사랑의 언어';
  sub.style.color = info.color;

  const order = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  let scoreHtml = '';
  order.forEach(([k, v]) => {
    const inf = langInfo[k];
    const pct = Math.round((v / questions.length) * 100);
    scoreHtml += `<div class="score-row">
      <div class="score-icon">${inf.icon}</div>
      <div class="score-name" style="color:${inf.color}">${inf.name}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%;background:${inf.bar}"></div></div>
      <div class="score-num">${v}점</div>
    </div>`;
  });
  document.getElementById('score-grid').innerHTML = scoreHtml;

  document.getElementById('res-content').innerHTML = `
    <div class="section-card">
      <div class="section-title">나는 어떤 사람인가요</div>
      <div class="section-content">${info.desc}
        <div class="tag-wrap">${info.keywords.map(k => `<span class="tag">${k}</span>`).join('')}</div>
      </div>
    </div>
    <div class="section-card">
      <div class="section-title">내가 사랑을 주는 방법</div>
      <div class="section-content">${info.give}</div>
    </div>
    <div class="section-card">
      <div class="section-title">내가 사랑을 받는 방법</div>
      <div class="section-content">${info.receive}</div>
    </div>`;
}

function restart() {
  answers = {};
  current = 0;
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  renderQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQ();
</script>
</body>
</html>
